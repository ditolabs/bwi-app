<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis tanpa limit.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { min-height: 100vh; background: #0c1a0c; font-family: 'DM Sans', system-ui, -apple-system, sans-serif; color: #f0e8d8; -webkit-font-smoothing: antialiased; }
    #app { max-width: 640px; margin: 0 auto; padding: 0 20px; }
    #header { padding-top: 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 9px; }
    .logo-icon { width: 30px; height: 30px; background: #e07b39; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .logo-text { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
    .logo-badge { font-size: 10px; color: #4a6a4a; background: rgba(74,106,74,.18); padding: 2px 9px; border-radius: 20px; font-weight: 500; }
    #progress-area { margin-bottom: 20px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .step-label { font-size: 10px; font-weight: 400; color: #2a4a2a; letter-spacing: .04em; transition: color .3s; }
    .step-label.active { font-weight: 700; color: #e07b39; }
    .step-label.done   { color: #4a7a4a; }
    .progress-bar { height: 2px; background: rgba(255,255,255,.05); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #c96a2a, #e07b39); border-radius: 1px; transition: width .5s ease; }
    #nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 32px; border-top: 1px solid rgba(255,255,255,.04); margin-top: 4px; }
    .dest-count { font-size: 11px; color: #3a5a3a; }
    .btn-pri { background: #e07b39; color: #fff; border: none; border-radius: 10px; padding: 12px 22px; font-family: inherit; font-weight: 600; font-size: 15px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
    .btn-pri:hover:not(:disabled) { background: #c96a2a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(224,123,57,.3); }
    .btn-pri:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-ghost { background: transparent; color: #8fa08f; border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px; padding: 12px 22px; font-family: inherit; font-weight: 500; font-size: 15px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-ghost:hover  { border-color: rgba(255,255,255,.22); color: #c0d4c0; }
    .btn-ghost.hidden { visibility: hidden; }
    .step-title { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .step-sub { color: #6a8a6a; font-size: 14px; margin-bottom: 20px; }
    .field-label { display: block; font-size: 12px; font-weight: 600; color: #6a8a6a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .field-wrap { margin-bottom: 20px; }
    .cat-filter { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
    .cat-btn { background: rgba(255,255,255,.06); color: #8fa08f; border: none; border-radius: 20px; padding: 5px 13px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
    .cat-btn.active { background: #e07b39; color: #fff; }
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .dest-chip { padding: 13px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; user-select: none; }
    .dest-chip:hover { transform: translateY(-2px); }
    .dest-chip.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .dest-chip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dest-emoji { font-size: 22px; }
    .dest-check { width: 18px; height: 18px; border-radius: 50%; background: #e07b39; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; flex-shrink: 0; opacity: 0; transition: opacity .2s; }
    .dest-chip.selected .dest-check { opacity: 1; }
    .dest-name  { font-size: 13px; font-weight: 600; color: #f0e8d8; line-height: 1.3; margin-top: 8px; }
    .dest-desc  { font-size: 11px; color: #5a7a5a; margin-top: 3px; line-height: 1.4; }
    .dest-meta  { margin-top: 7px; display: flex; align-items: center; gap: 6px; }
    .cat-tag    { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .cat-tag.alam   { background: rgba(74,144,74,.15);  color: rgba(74,144,74,.95);  border: 1px solid rgba(74,144,74,.4); }
    .cat-tag.pantai { background: rgba(57,157,224,.15); color: rgba(57,157,224,.95); border: 1px solid rgba(57,157,224,.4); }
    .cat-tag.diving { background: rgba(57,224,200,.15); color: rgba(57,224,200,.95); border: 1px solid rgba(57,224,200,.4); }
    .cat-tag.budaya { background: rgba(224,178,57,.15); color: rgba(224,178,57,.95); border: 1px solid rgba(224,178,57,.4); }
    .best-time  { font-size: 10px; color: #4a6a4a; }
    .dest-notice { margin-top: 14px; padding: 10px 14px; background: rgba(224,123,57,.07); border: 1px solid rgba(224,123,57,.2); border-radius: 10px; font-size: 12px; color: #b08060; display: none; }
    .dest-notice.show { display: block; }
    select, input[type="text"] { background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1); color: #f0e8d8; border-radius: 10px; padding: 11px 14px; font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; width: 100%; appearance: none; -webkit-appearance: none; }
    select:focus, input:focus { border-color: rgba(224,123,57,.7); background: rgba(255,255,255,.07); }
    select option { background: #1a2e1a; color: #f0e8d8; }
    .select-wrap { position: relative; }
    .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #5a7a5a; font-size: 12px; }
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card-opt { padding: 13px 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 13px; }
    .card-opt:hover { transform: translateY(-2px); }
    .card-opt.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .card-opt.sm { padding: 11px 13px; border-radius: 10px; }
    .card-opt-icon { font-size: 24px; flex-shrink: 0; }
    .card-opt.sm .card-opt-icon { font-size: 20px; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: #f0e8d8; transition: color .2s; }
    .card-opt.sm .card-opt-title { font-size: 13px; font-weight: 500; }
    .card-opt.selected .card-opt-title { color: #e07b39; }
    .card-opt-sub { font-size: 12px; color: #5a7a5a; margin-top: 2px; }
    .card-opt.sm .card-opt-sub { font-size: 11px; }
    .card-opt-check { color: #e07b39; font-size: 14px; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .2s; }
    .card-opt.selected .card-opt-check { opacity: 1; }
    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .35s ease; }
    .sewa-wrap.open { max-height: 420px; opacity: 1; }
    .sewa-box { padding: 15px; border-radius: 12px; background: rgba(107,159,212,.06); border: 1.5px solid rgba(107,159,212,.2); margin-bottom: 4px; }
    .sewa-title { font-size: 13px; font-weight: 700; color: #6b9fd4; margin-bottom: 4px; }
    .sewa-sub   { font-size: 12px; color: #5a7a5a; margin-bottom: 12px; line-height: 1.5; }
    .card-opt.sewa-sel { background: rgba(107,159,212,.12) !important; border-color: rgba(107,159,212,.6) !important; }
    .card-opt.sewa-sel .card-opt-title { color: #6b9fd4 !important; }
    .card-opt.sewa-sel .card-opt-check { opacity: 1 !important; color: #6b9fd4 !important; }
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt { padding: 10px 15px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; text-align: center; }
    .pill-opt:hover { transform: translateY(-1px); }
    .pill-opt.selected { background: rgba(224,123,57,.13); border-color: #e07b39; }
    .pill-label { font-size: 13px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .pill-opt.selected .pill-label { color: #e07b39; }
    .pill-sub { font-size: 10px; color: #5a7a5a; margin-top: 2px; }
    .gaya-row { display: flex; gap: 10px; }
    .gaya-card { flex: 1; padding: 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; text-align: center; }
    .gaya-card:hover { transform: translateY(-2px); }
    .gaya-card.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .gaya-emoji { font-size: 28px; margin-bottom: 8px; }
    .gaya-label { font-size: 14px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .gaya-card.selected .gaya-label { color: #e07b39; }
    .gaya-desc  { font-size: 11px; color: #5a7a5a; margin-top: 7px; line-height: 1.6; white-space: pre-line; }
    .counter-row { display: flex; align-items: center; gap: 14px; }
    .cnt-btn { background: rgba(255,255,255,.07); color: #f0e8d8; border: 1.5px solid rgba(255,255,255,.12); border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .cnt-btn:hover { background: rgba(255,255,255,.13); }
    .cnt-val   { font-size: 22px; font-weight: 700; min-width: 30px; text-align: center; }
    .cnt-label { font-size: 13px; color: #5a7a5a; }
    .loading-screen { text-align: center; padding: 64px 0; }
    .loading-icon { font-size: 52px; margin-bottom: 18px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin-bottom: 10px; line-height: 1.3; }
    .loading-sub  { color: #5a7a5a; font-size: 13px; line-height: 1.6; }
    .loading-tags { display: flex; gap: 7px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .loading-tag  { font-size: 11px; color: #4a6a4a; background: rgba(74,106,74,.15); padding: 4px 11px; border-radius: 20px; }
    .dot { animation: bou 1.4s ease-in-out infinite; display: inline-block; }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bou { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-7px);opacity:1} }
    .error-screen { text-align: center; padding: 64px 0; }
    .result-summary { padding: 18px; background: rgba(224,123,57,.07); border: 1.5px solid rgba(224,123,57,.2); border-radius: 16px; margin-bottom: 22px; }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .result-title { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; flex: 1; line-height: 1.3; }
    .result-budget-label { font-size: 10px; color: #6a8a6a; text-align: right; }
    .result-budget-val   { font-size: 16px; font-weight: 700; color: #e07b39; }
    .result-desc  { font-size: 13px; color: #a0b090; line-height: 1.6; margin-bottom: 10px; }
    .highlight-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .highlight-tag  { font-size: 11px; padding: 3px 9px; background: rgba(224,123,57,.1); border: 1px solid rgba(224,123,57,.25); border-radius: 20px; color: #b08060; }
    .budget-note { font-size: 11px; color: #4a6a4a; }
    .day-section { margin-bottom: 24px; animation: fdi .5s ease both; }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .day-num { width: 32px; height: 32px; background: #e07b39; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .day-label    { font-size: 10px; color: #5a7a5a; text-transform: uppercase; letter-spacing: .05em; }
    .day-title-txt { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 600; line-height: 1.3; }
    .act-list { padding-left: 4px; }
    .act-item { display: flex; gap: 12px; margin-bottom: 12px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 22px; }
    .act-icon { font-size: 15px; }
    .act-line { width: 1px; flex: 1; background: rgba(255,255,255,.05); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .act-time     { font-size: 11px; color: #5a7a5a; font-weight: 500; }
    .act-duration { font-size: 11px; color: #3d5a3d; margin-left: 7px; }
    .act-cost     { font-size: 11px; color: #6a8a6a; background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
    .act-name     { font-size: 14px; font-weight: 600; color: #f0e8d8; line-height: 1.3; }
    .act-location { font-size: 11px; color: #4a6a4a; margin-top: 2px; }
    .act-desc     { font-size: 12px; color: #7a9a7a; line-height: 1.55; margin-top: 4px; }
    .act-tip      { margin-top: 7px; padding: 6px 10px; border-radius: 7px; font-size: 11px; line-height: 1.5; border-left: 2px solid; }
    .packing-box  { padding: 15px; background: rgba(255,255,255,.03); border-radius: 12px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,.07); }
    .packing-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .packing-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
    .packing-tag   { font-size: 11px; padding: 4px 10px; background: rgba(255,255,255,.05); border-radius: 20px; color: #7a9a7a; }
    .notes-box { padding: 13px; background: rgba(224,178,57,.06); border-radius: 10px; border: 1px solid rgba(224,178,57,.15); margin-bottom: 22px; font-size: 12px; color: #a09040; line-height: 1.5; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    @media (max-width: 380px) { .step-title { font-size: 22px; } .dest-grid  { gap: 7px; } }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo-icon">🗺️</div>
    <span class="logo-text">Wandr</span>
    <span class="logo-badge">Banyuwangi</span>
  </div>
  <div id="progress-area">
    <div class="step-labels">
      <span class="step-label active" data-i="0">Destinasi</span>
      <span class="step-label"        data-i="1">Transport</span>
      <span class="step-label"        data-i="2">Preferensi</span>
      <span class="step-label"        data-i="3">Generate</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div id="content"></div>
  <div id="nav">
    <button class="btn-ghost hidden" id="btn-back">← Kembali</button>
    <span class="dest-count" id="dest-count"></span>
    <button class="btn-pri" id="btn-next" disabled>Lanjut →</button>
  </div>
</div>

<script>
// ─── DATA DESTINASI (DENGAN KOORDINAT) ──────────────────────────────────────
const DESTINATIONS = [
  { id:'ijen',         name:'Kawah Ijen',        cat:'alam',   emoji:'🌋', desc:'Blue fire & kawah asam',      bestTime:'01:00', lat: -8.058, lng: 114.242, cost: 100000 },
  { id:'baluran',      name:'TN Baluran',        cat:'alam',   emoji:'🦌', desc:'Afrika van Java',             bestTime:'15:00', lat: -7.842, lng: 114.393, cost: 20000 },
  { id:'alas_purwo',   name:'TN Alas Purwo',     cat:'alam',   emoji:'🌿', desc:'Hutan purba tersembunyi',     bestTime:'08:00', lat: -8.675, lng: 114.382, cost: 20000 },
  { id:'kawah_wurung', name:'Kawah Wurung',      cat:'alam',   emoji:'🏔️', desc:'Kaldera indah & sunrise',     bestTime:'05:00', lat: -8.066, lng: 114.223, cost: 15000 },
  { id:'jagir',        name:'Air Terjun Jagir',  cat:'alam',   emoji:'💧', desc:'Air terjun tiga tingkat',     bestTime:'09:00', lat: -8.216, lng: 114.303, cost: 10000 },
  { id:'red_island',   name:'Red Island',        cat:'pantai', emoji:'🏄', desc:'Tebing merah & sunset',       bestTime:'16:00', lat: -8.601, lng: 114.029, cost: 15000 },
  { id:'green_bay',    name:'Green Bay',         cat:'pantai', emoji:'🌊', desc:'Teluk ijo tersembunyi',       bestTime:'09:00', lat: -8.563, lng: 113.987, cost: 25000 },
  { id:'sukamade',     name:'Pantai Sukamade',   cat:'pantai', emoji:'🐢', desc:'Penangkaran penyu hijau',     bestTime:'20:00', lat: -8.544, lng: 113.882, cost: 250000 },
  { id:'g_land',       name:'G-Land',            cat:'pantai', emoji:'🏄', desc:'Surga peselancar dunia',      bestTime:'10:00', lat: -8.729, lng: 114.356, cost: 50000 },
  { id:'menjangan',    name:'Pulau Menjangan',   cat:'diving', emoji:'🤿', desc:'Snorkeling & diving terbaik', bestTime:'08:00', lat: -8.093, lng: 114.521, cost: 300000 },
  { id:'tabuhan',      name:'Pulau Tabuhan',     cat:'diving', emoji:'🏝️', desc:'Pasir putih & snorkeling',    bestTime:'10:00', lat: -8.046, lng: 114.444, cost: 150000 },
  { id:'city',         name:'City Tour BWI',     cat:'budaya', emoji:'🏛️', desc:'Kuliner & wisata kota',       bestTime:'12:00', lat: -8.219, lng: 114.369, cost: 50000 },
];

const KOTA = ['Surabaya','Jakarta','Bali/Denpasar','Malang','Yogyakarta','Semarang','Bandung','Lainnya'];
const DURASI = [
  { v:'1D',   label:'1 Hari', sub:'One Day Trip', val:1 },
  { v:'2D1N', label:'2H 1M',  sub:'Weekend Trip', val:2 },
  { v:'3D2N', label:'3H 2M',  sub:'Long Weekend', val:3 },
  { v:'4D3N', label:'4H 3M',  sub:'Mini Vacation', val:4 },
  { v:'5D4N', label:'5H 4M',  sub:'Full Exploration', val:5 },
];
const PENGINAPAN = [
  { v:'hotel45',  label:'Hotel Bintang 4–5',   range:'400K–2JT/mlm',  emoji:'🏨', basePrice: 750000 },
  { v:'hotel3',   label:'Hotel Bintang 3',     range:'200K–400K/mlm', emoji:'🏩', basePrice: 300000 },
  { v:'hotel12',  label:'Hotel Bintang 1–2',   range:'100K–200K/mlm', emoji:'🏪', basePrice: 150000 },
  { v:'homestay', label:'Homestay/Guesthouse', range:'50K–150K/mlm',  emoji:'🏡', basePrice: 100000 },
  { v:'none',     label:'Tanpa Penginapan',    range:'Day trip only', emoji:'🚗', basePrice: 0 },
];
const ACT_STYLE = {
  aktivitas:  { color:'#e07b39', bg:'rgba(224,123,57,.1)',  icon:'🎯' },
  makan:      { color:'#4ab06a', bg:'rgba(74,176,106,.1)',  icon:'🍽️' },
  transport:  { color:'#6b9fd4', bg:'rgba(107,159,212,.1)', icon:'🚌' },
  penginapan: { color:'#c47bd4', bg:'rgba(196,123,212,.1)', icon:'🏨' },
  istirahat:  { color:'#8fa08f', bg:'rgba(143,160,143,.1)', icon:'☕' },
};

const S = {
  step: 0, destinations: new Set(), activeCat: 'semua', kotaAsal: '', kotaAsalCustom: '',
  transport: '', sewaLokal: new Set(), durasi: '', gayaPerjalanan: '', penginapan: '',
  jumlahOrang: 2, loading: false, itinerary: null, error: null,
};

const fmt = n => {
  if (!n) return '–';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'JT';
  if (n >= 1000)    return Math.round(n/1000) + 'K';
  return String(n);
};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// RUMUS HAVERSINE UNTUK JARAK
function hitungJarak(lat1, lon1, lat2, lon2) {
  const R = 6371; 
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function updateProgress() {
  const pct = S.step === 3 ? 100 : (S.step / 3) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.querySelectorAll('.step-label').forEach(el => {
    const i = +el.dataset.i;
    el.className = 'step-label' + (i===S.step?' active': i<S.step?' done':'');
  });
  document.getElementById('progress-area').style.display = S.step===3 ? 'none' : '';
}

function updateNav() {
  const nav = document.getElementById('nav');
  if (S.step===3) { nav.style.display='none'; return; }
  nav.style.display = 'flex';
  document.getElementById('btn-back').className = 'btn-ghost' + (S.step===0?' hidden':'');
  document.getElementById('dest-count').textContent = S.destinations.size>0 ? S.destinations.size+' destinasi dipilih' : '';
  const ok = canNext();
  document.getElementById('btn-next').disabled = !ok;
  document.getElementById('btn-next').textContent = S.step===2 ? '✨ Generate Itinerary' : 'Lanjut →';
}

function canNext() {
  if (S.step===0) return S.destinations.size > 0;
  if (S.step===1) return S.kotaAsal && (S.kotaAsal!=='Lainnya'||S.kotaAsalCustom.trim()) && S.transport;
  if (S.step===2) return S.durasi && S.gayaPerjalanan && S.penginapan;
  return false;
}

function renderStep0() {
  const cats = ['semua','alam','pantai','diving','budaya'];
  const catLabel = { semua:'Semua', alam:'Alam', pantai:'Pantai', diving:'Diving', budaya:'Budaya' };
  const list = S.activeCat==='semua' ? DESTINATIONS : DESTINATIONS.filter(d=>d.cat===S.activeCat);
  const catBtns = cats.map(c => `<button class="cat-btn${S.activeCat===c?' active':''}" data-cat="${c}">${catLabel[c]}</button>`).join('');
  const chips = list.map(d => {
    const sel = S.destinations.has(d.id);
    return `<div class="dest-chip${sel?' selected':''}" data-dest="${d.id}"><div class="dest-chip-top"><span class="dest-emoji">${d.emoji}</span><span class="dest-check">✓</span></div><div class="dest-name">${esc(d.name)}</div><div class="dest-desc">${esc(d.desc)}</div><div class="dest-meta"><span class="cat-tag ${d.cat}">${catLabel[d.cat]}</span></div></div>`;
  }).join('');
  return `<h2 class="step-title">Mau ke mana?</h2><p class="step-sub">Pilih satu atau beberapa destinasi yang ingin dikunjungi</p><div class="cat-filter">${catBtns}</div><div class="dest-grid">${chips}</div><div class="dest-notice${S.destinations.size>0?' show':''}" id="dest-notice">✓ ${S.destinations.size} destinasi dipilih · Rute akan dioptimasi otomatis</div>`;
}

function renderStep1() {
  const transOpts = [{ v:'pribadi_motor', label:'Motor Pribadi', emoji:'🏍️', sub:'Fleksibel, hemat, masuk jalan kecil' },{ v:'pribadi_mobil', label:'Mobil Pribadi', emoji:'🚗', sub:'Nyaman, bawa lebih banyak barang' },{ v:'umum', label:'Kendaraan Umum', emoji:'🚂', sub:'Kereta / Bus / Pesawat ke BWI' }];
  const sewaOpts = [{ v:'motor', label:'Sewa Motor', emoji:'🏍️', sub:'~100K–150K/hari' },{ v:'mobil_driver', label:'Sewa Mobil + Driver', emoji:'🚐', sub:'~450K–650K/hari' },{ v:'ojek', label:'Ojek / Online', emoji:'📱', sub:'Gojek, Grab, ojek pangkalan' }];
  const kotaOpts = KOTA.map(k => `<option value="${k}"${S.kotaAsal===k?' selected':''}>${k}</option>`).join('');
  const transCards = transOpts.map(t => `<div class="card-opt${S.transport===t.v?' selected':''}" data-transport="${t.v}"><span class="card-opt-icon">${t.emoji}</span><div><div class="card-opt-title">${t.label}</div><div class="card-opt-sub">${t.sub}</div></div><span class="card-opt-check">✓</span></div>`).join('');
  const sewaCards = sewaOpts.map(s => `<div class="card-opt sm${S.sewaLokal.has(s.v)?' selected sewa-sel':''}" data-sewa="${s.v}"><span class="card-opt-icon">${s.emoji}</span><div><div class="card-opt-title">${s.label}</div><div class="card-opt-sub">${s.sub}</div></div><span class="card-opt-check">✓</span></div>`).join('');
  return `<h2 class="step-title">Naik apa?</h2><p class="step-sub">Pilih kota asal dan kendaraan ke Banyuwangi</p><div class="field-wrap"><label class="field-label">Kota Asal</label><div class="select-wrap"><select id="sel-kota"><option value="">Pilih kota asal...</option>${kotaOpts}</select><span class="select-arrow">▾</span></div>${S.kotaAsal==='Lainnya' ? `<input type="text" id="input-kota-custom" placeholder="Tulis kota asal…" value="${esc(S.kotaAsalCustom)}" style="margin-top:8px">` : ''}</div><div class="field-wrap"><label class="field-label">Kendaraan ke Banyuwangi</label><div class="card-list">${transCards}</div></div><div class="sewa-wrap${S.transport==='umum'?' open':''}" id="sewa-wrap"><div class="sewa-box"><div class="sewa-title">🚉 Mobilitas Lokal di Banyuwangi</div><div class="sewa-sub">Pilih kendaraan setelah tiba. Boleh lebih dari satu.</div><div class="card-list">${sewaCards}</div></div></div>`;
}

function renderStep2() {
  const durasiBtns = DURASI.map(d => `<div class="pill-opt${S.durasi===d.v?' selected':''}" data-durasi="${d.v}"><div class="pill-label">${d.label}</div><div class="pill-sub">${d.sub}</div></div>`).join('');
  const gayaCards = [{ v:'santai', emoji:'🌴', label:'Santai', desc:'Maks 2 destinasi/hari\nBanyak waktu menikmati' },{ v:'eksplorasi',emoji:'⚡', label:'Eksplorasi', desc:'3–4 destinasi/hari\nEfisien & terpadatkan' }].map(g => `<div class="gaya-card${S.gayaPerjalanan===g.v?' selected':''}" data-gaya="${g.v}"><div class="gaya-emoji">${g.emoji}</div><div class="gaya-label">${g.label}</div><div class="gaya-desc">${g.desc}</div></div>`).join('');
  const penginapanCards = PENGINAPAN.map(p => `<div class="card-opt sm${S.penginapan===p.v?' selected':''}" data-penginapan="${p.v}"><span class="card-opt-icon">${p.emoji}</span><div><div class="card-opt-title">${p.label}</div><div class="card-opt-sub">${p.range}</div></div><span class="card-opt-check">✓</span></div>`).join('');
  return `<h2 class="step-title">Preferensi Trip</h2><p class="step-sub">Sesuaikan dengan gaya traveling kamu</p><div class="field-wrap"><label class="field-label">Durasi Perjalanan</label><div class="pill-row">${durasiBtns}</div></div><div class="field-wrap"><label class="field-label">Gaya Perjalanan</label><div class="gaya-row">${gayaCards}</div></div><div class="field-wrap"><label class="field-label">Penginapan</label><div class="card-list">${penginapanCards}</div></div><div class="field-wrap"><label class="field-label">Jumlah Orang</label><div class="counter-row"><button class="cnt-btn" id="btn-minus">−</button><span class="cnt-val" id="cnt-val">${S.jumlahOrang}</span><button class="cnt-btn" id="btn-plus">+</button><span class="cnt-label">orang</span></div></div>`;
}

function renderStep3() {
  if (S.loading) return `<div class="loading-screen"><div class="loading-icon">🗺️</div><h3 class="loading-title">Menghitung rute terbaik<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></h3><p class="loading-sub">Algoritma sedang mengoptimasi koordinat perjalananmu tanpa koneksi AI.</p></div>`;
  if (S.error) return `<div class="error-screen"><div style="font-size:48px;margin-bottom:14px">⚠️</div><h3 style="font-size:18px;margin-bottom:8px">Gagal generate</h3><p style="color:#5a7a5a;font-size:13px;margin-bottom:22px">${esc(S.error)}</p><button class="btn-pri" id="btn-retry">↺ Coba Lagi</button></div>`;
  if (!S.itinerary) return '';

  const it = S.itinerary;
  const highlights = (it.highlights||[]).map(h => `<span class="highlight-tag">★ ${esc(h)}</span>`).join('');
  const days = (it.days||[]).map((day, di) => {
    const acts = (day.activities||[]).map((act, ai) => {
      const as = ACT_STYLE[act.type] || ACT_STYLE.aktivitas;
      const isLast = ai === day.activities.length - 1;
      return `<div class="act-item" style="animation-delay:${di*.12+ai*.07}s"><div class="act-timeline"><span class="act-icon">${as.icon}</span>${!isLast ? '<div class="act-line"></div>' : ''}</div><div class="act-body"><div class="act-meta"><div><span class="act-time">${esc(act.time||'')}</span>${act.duration ? `<span class="act-duration">· ${esc(act.duration)}</span>` : ''}</div>${act.estimatedCost>0 ? `<span class="act-cost">~${fmt(act.estimatedCost)}</span>` : ''}</div><div class="act-name">${esc(act.name)}</div>${act.location&&act.location!==act.name ? `<div class="act-location">📍 ${esc(act.location)}</div>` : ''}<div class="act-desc">${esc(act.description||'')}</div>${act.tips ? `<div class="act-tip" style="background:${as.bg};border-color:${as.color};color:${as.color}">💡 ${esc(act.tips)}</div>` : ''}</div></div>`;
    }).join('');
    return `<div class="day-section" style="animation-delay:${di*.15}s"><div class="day-header"><div class="day-num">${day.day}</div><div><div class="day-label">${esc(day.date_label||'')}</div><div class="day-title-txt">${esc(day.title||'')}</div></div></div><div class="act-list">${acts}</div></div>`;
  }).join('');
  const packingTags = (it.packingTips||[]).map(t => `<span class="packing-tag">${esc(t)}</span>`).join('');
  return `<div class="result-summary"><div class="result-top"><div class="result-title">Itinerary Banyuwangi ✨</div><div style="text-align:right;flex-shrink:0"><div class="result-budget-label">Est. Budget/org</div><div class="result-budget-val">${fmt(it.estimatedBudget?.min)}–${fmt(it.estimatedBudget?.max)}</div></div></div><div class="result-desc">${esc(it.summary||'')}</div><div class="highlight-tags">${highlights}</div>${it.estimatedBudget?.note ? `<div class="budget-note">ℹ️ ${esc(it.estimatedBudget.note)}</div>` : ''}</div>${days}${packingTags ? `<div class="packing-box"><div class="packing-title">🎒 Perlengkapan yang Perlu Dibawa</div><div class="packing-tags">${packingTags}</div></div>` : ''}${it.importantNotes ? `<div class="notes-box">⚠️ ${esc(it.importantNotes)}</div>` : ''}<button class="btn-ghost" id="btn-restart" style="width:100%;justify-content:center">↺ Buat Itinerary Baru</button>`;
}

function render() {
  const c = document.getElementById('content');
  switch (S.step) { case 0: c.innerHTML = renderStep0(); break; case 1: c.innerHTML = renderStep1(); break; case 2: c.innerHTML = renderStep2(); break; case 3: c.innerHTML = renderStep3(); break; }
  updateProgress(); updateNav(); attachListeners();
}

function attachListeners() {
  const c = document.getElementById('content');
  c.querySelectorAll('[data-cat]').forEach(el => el.addEventListener('click', () => { S.activeCat = el.dataset.cat; render(); }));
  c.querySelectorAll('[data-dest]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.dest;
    S.destinations.has(id) ? S.destinations.delete(id) : S.destinations.add(id);
    el.classList.toggle('selected', S.destinations.has(id));
    const notice = document.getElementById('dest-notice');
    if (notice) { notice.className = 'dest-notice' + (S.destinations.size>0?' show':''); notice.textContent = `✓ ${S.destinations.size} destinasi dipilih · Rute akan dioptimasi otomatis`; }
    updateNav();
  }));
  const selKota = document.getElementById('sel-kota'); if (selKota) selKota.addEventListener('change', () => { S.kotaAsal = selKota.value; S.kotaAsalCustom = ''; render(); });
  const inputKota = document.getElementById('input-kota-custom'); if (inputKota) inputKota.addEventListener('input', () => { S.kotaAsalCustom = inputKota.value; updateNav(); });
  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => { S.transport = el.dataset.transport; S.sewaLokal.clear(); c.querySelectorAll('[data-transport]').forEach(e => e.classList.toggle('selected', e.dataset.transport===S.transport)); const sw = document.getElementById('sewa-wrap'); if (sw) sw.classList.toggle('open', S.transport==='umum'); c.querySelectorAll('[data-sewa]').forEach(e => { e.classList.remove('selected','sewa-sel'); }); updateNav(); }));
  c.querySelectorAll('[data-sewa]').forEach(el => el.addEventListener('click', () => { const v = el.dataset.sewa; S.sewaLokal.has(v) ? S.sewaLokal.delete(v) : S.sewaLokal.add(v); el.classList.toggle('selected', S.sewaLokal.has(v)); el.classList.toggle('sewa-sel', S.sewaLokal.has(v)); }));
  c.querySelectorAll('[data-durasi]').forEach(el => el.addEventListener('click', () => { S.durasi = el.dataset.durasi; c.querySelectorAll('[data-durasi]').forEach(e => e.classList.toggle('selected', e.dataset.durasi===S.durasi)); updateNav(); }));
  c.querySelectorAll('[data-gaya]').forEach(el => el.addEventListener('click', () => { S.gayaPerjalanan = el.dataset.gaya; c.querySelectorAll('[data-gaya]').forEach(e => e.classList.toggle('selected', e.dataset.gaya===S.gayaPerjalanan)); updateNav(); }));
  c.querySelectorAll('[data-penginapan]').forEach(el => el.addEventListener('click', () => { S.penginapan = el.dataset.penginapan; c.querySelectorAll('[data-penginapan]').forEach(e => e.classList.toggle('selected', e.dataset.penginapan===S.penginapan)); updateNav(); }));
  const minus = document.getElementById('btn-minus'); const plus  = document.getElementById('btn-plus'); const cntEl = document.getElementById('cnt-val');
  if (minus) minus.addEventListener('click', () => { S.jumlahOrang = Math.max(1, S.jumlahOrang-1); if (cntEl) cntEl.textContent = S.jumlahOrang; });
  if (plus) plus.addEventListener('click', () => { S.jumlahOrang = Math.min(20, S.jumlahOrang+1); if (cntEl) cntEl.textContent = S.jumlahOrang; });
  const retry = document.getElementById('btn-retry'); const restart = document.getElementById('btn-restart');
  if (retry) retry.addEventListener('click', () => { S.error=null; generate(); });
  if (restart) restart.addEventListener('click', () => { Object.assign(S, { step:0, activeCat:'semua', kotaAsal:'', kotaAsalCustom:'', transport:'', durasi:'', gayaPerjalanan:'', penginapan:'', jumlahOrang:2, loading:false, itinerary:null, error:null }); S.destinations.clear(); S.sewaLokal.clear(); render(); });
}

document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', () => { if (S.step===2) { S.step=3; S.loading=true; S.itinerary=null; S.error=null; render(); generate(); } else { S.step++; render(); } });

// ─── GENERATOR RULE-BASED (TANPA AI/API) ────────────────────────────────────
async function generate() {
  await new Promise(r => setTimeout(r, 900)); // Simulasi loading agar UI natural

  try {
    const selectedList = DESTINATIONS.filter(d => S.destinations.has(d.id));
    if (selectedList.length === 0) throw new Error("Pilih minimal 1 destinasi wisata.");

    const totalHari = DURASI.find(d => d.v === S.durasi)?.val || 1;
    const spotPerHari = S.gayaPerjalanan === 'santai' ? 2 : 4;
    const infoPenginapan = PENGINAPAN.find(p => p.v === S.penginapan);
    
    // Titik awal virtual (Banyuwangi Kota)
    let currentLokasi = { lat: -8.219, lng: 114.369 };
    let unvisited = [...selectedList];
    let ruteTerurut = [];

    // ALGORITMA NEAREST NEIGHBOR (Cari rute terdekat agar tidak zig-zag)
    while (unvisited.length > 0) {
      unvisited.sort((a, b) => hitungJarak(currentLokasi.lat, currentLokasi.lng, a.lat, a.lng) - hitungJarak(currentLokasi.lat, currentLokasi.lng, b.lat, b.lng));
      let nextSpot = unvisited.shift();
      ruteTerurut.push(nextSpot);
      currentLokasi = { lat: nextSpot.lat, lng: nextSpot.lng };
    }

    let daysArray = [];
    let ruteIndex = 0;
    let totalBiayaWisata = 0;

    // ALGORITMA DAY SPLITTER (Pemecah Hari)
    for (let hariKe = 1; hariKe <= totalHari; hariKe++) {
      let aktivitasHariIni = [];
      let jumlahSpotDihariIni = 0;

      aktivitasHariIni.push({
        time: "07:00", name: "Sarapan Pagi", location: "Kawasan Penginapan", duration: "1 jam",
        description: "Persiapan fisik sebelum eksplorasi.", type: "makan", estimatedCost: 25000
      });

      let jamSekarang = 8; 

      while (jumlahSpotDihariIni < spotPerHari && ruteIndex < ruteTerurut.length) {
        let dest = ruteTerurut[ruteIndex];
        
        // Pengecualian Aturan Waktu Hardcoded
        if (dest.id === 'ijen') {
          aktivitasHariIni.unshift({
            time: "01:00", name: dest.name, location: "Paltuding", duration: "4-5 jam",
            description: dest.desc + " - Pendakian menuju kawah untuk melihat Blue Fire.", type: "aktivitas", estimatedCost: dest.cost, tips: "Bawa jaket tebal dan sewa masker gas."
          });
          totalBiayaWisata += dest.cost;
        } 
        else if (dest.id === 'red_island' || dest.id === 'sukamade') {
          aktivitasHariIni.push({
            time: dest.bestTime, name: dest.name, location: dest.name, duration: "3 jam",
            description: dest.desc, type: "aktivitas", estimatedCost: dest.cost
          });
          totalBiayaWisata += dest.cost;
        } 
        else {
          aktivitasHariIni.push({
            time: `${jamSekarang.toString().padStart(2, '0')}:00`, name: dest.name, location: dest.name, duration: "2 jam",
            description: dest.desc, type: "aktivitas", estimatedCost: dest.cost
          });
          jamSekarang += 3; 
          totalBiayaWisata += dest.cost;
        }
        jumlahSpotDihariIni++; ruteIndex++;
      }

      aktivitasHariIni.push({
        time: "18:00", name: "Makan Malam", location: "Kuliner Lokal", duration: "1 jam",
        description: "Waktunya isi tenaga. Rekomendasi: Sego Tempong atau Rujak Soto khas Banyuwangi.", type: "makan", estimatedCost: 35000
      });
      aktivitasHariIni.push({
        time: "20:00", name: "Istirahat", location: "Penginapan", duration: "",
        description: "Kembali ke penginapan untuk merebahkan badan.", type: "penginapan", estimatedCost: infoPenginapan.basePrice
      });

      aktivitasHariIni.sort((a, b) => a.time.localeCompare(b.time));
      daysArray.push({ day: hariKe, date_label: `Hari ${hariKe}`, title: "Eksplorasi Banyuwangi", activities: aktivitasHariIni });
    }

    const totalMalam = totalHari > 1 ? totalHari - 1 : 0;
    const budgetHotel = infoPenginapan.basePrice * totalMalam;
    const budgetMakan = 60000 * totalHari;
    const minBudget = totalBiayaWisata + budgetHotel + budgetMakan;
    const maxBudget = minBudget + (minBudget * 0.3);

    S.itinerary = {
      summary: `Rute perjalanan ini telah dioptimalkan secara matematis untuk menempuh ${selectedList.length} titik destinasi dalam ${totalHari} hari tanpa membuang waktu bolak-balik di jalan.`,
      totalDays: totalHari,
      highlights: ruteTerurut.slice(0, 3).map(d => d.name),
      estimatedBudget: { min: minBudget, max: maxBudget, note: "Biaya per orang. Belum termasuk transportasi jarak jauh dari kota asal." },
      days: daysArray,
      packingTips: ["Obat pribadi", "Pakaian ganti", "Sunblock", "Jaket (jika ada rute pegunungan)", "Uang tunai pecahan kecil"],
      importantNotes: "Jadwal ini di-generate secara otomatis dan luring (offline) menggunakan kalkulasi jarak spasial murni, bebas dari limit API."
    };

  } catch (e) {
    S.error = e.message || 'Terjadi kesalahan pada perhitungan rute.';
  } finally {
    S.loading = false;
    render();
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
