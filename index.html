<!DOCTYPE html>
<html lang="id" dir="ltr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis dengan AI. Masukkan destinasi, pilih kendaraan dan durasi, itinerary langsung jadi.">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS + extended config -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "sunset-vibrant": "#e07b39",
            "sunset-hover": "#c96a2a",
            "forest-deep": "#0c1a0c",
            "forest-elevated": "#1a2e1a",
            "earth-sand": "#f0e8d8",
            "moss-muted": "#5a7a5a",
            "glass-fill": "rgba(255, 255, 255, 0.04)",
            "glass-stroke": "rgba(255, 255, 255, 0.08)",
            "surface": "#08160b",
            "on-surface": "#d6e7d4",
            "surface-variant": "#29382b",
            "on-surface-variant": "#dcc1b4",
            "primary": "#ffb68c",
            "secondary": "#bacbb5",
            "background": "#08160b",
            "on-background": "#d6e7d4",
            "primary-container": "#e07b39",
            "on-primary-container": "#532200",
            "error": "#ffb4ab",
            "outline": "#a38c80",
          },
          borderRadius: { 'xl': '0.75rem', '2xl': '1rem' },
          fontFamily: { 'display': ['Playfair Display', 'serif'], 'sans': ['DM Sans', 'sans-serif'] },
          animation: { 'fade-in': 'fadeIn 0.5s ease-out', 'slide-up': 'slideUp 0.4s ease-out' },
          keyframes: {
            fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
            slideUp: { from: { transform: 'translateY(10px)', opacity: 0 }, to: { transform: 'translateY(0)', opacity: 1 } }
          }
        }
      }
    }
  </script>
  
  <style>
    body { background-color: #0c1a0c; color: #d6e7d4; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .sortable-drag { opacity: 0.4; transform: scale(0.95); cursor: grabbing; }
    .sortable-ghost { opacity: 0.3; background: rgba(224, 123, 57, 0.1); border: 2px dashed #e07b39; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #5a7a5a; border-radius: 4px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .step-label { transition: all 0.2s; cursor: default; }
    .step-label.active { color: #e07b39; font-weight: 700; }
    .step-label.done { color: #5a7a5a; }
    .btn-pri { background: #e07b39; color: white; border-radius: 9999px; padding: 10px 22px; font-weight: 600; transition: all 0.2s; }
    .btn-pri:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 9999px; padding: 10px 22px; transition: all 0.2s; }
    .btn-ghost.hidden { display: none; }
  </style>
</head>
<body class="bg-forest-deep text-on-surface font-sans antialiased">

<!-- Login Modal -->
<div id="modalLogin" style="display:none;position:fixed;inset:0;background:rgba(12,26,12,.7);backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;padding:20px">
  <div style="background:#1a2e1a;border-radius:20px;width:100%;max-width:320px;padding:28px;border:1px solid rgba(255,255,255,.1)">
    <div style="display:flex;justify-content:space-between;margin-bottom:22px">
      <div><div style="font-size:18px;font-weight:700">🔐 Masuk Admin</div><div style="font-size:11px;color:#4a6a4a">Wandr · Banyuwangi</div></div>
      <button id="closeLogin" style="background:rgba(255,255,255,.07);border:none;color:#6a8a6a;width:32px;height:32px;border-radius:50%">✕</button>
    </div>
    <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 bg-white/5 border border-white/10 rounded-xl mb-3 text-white">
    <input type="password" id="loginPass" placeholder="Password" class="w-full p-3 bg-white/5 border border-white/10 rounded-xl mb-4 text-white">
    <button id="btnDoLogin" class="w-full bg-sunset-vibrant py-3 rounded-xl font-bold">Masuk</button>
    <p id="loginErr" class="text-xs text-red-400 mt-2 text-center hidden"></p>
  </div>
</div>

<!-- User Menu -->
<div class="user-menu hidden fixed top-16 right-4 z-50 bg-forest-elevated border border-white/10 rounded-xl shadow-xl w-48" id="user-menu">
  <div class="p-2">
    <div class="p-2 text-sm" id="menu-username">Admin</div>
    <div class="border-t border-white/10 my-1"></div>
    <button onclick="window.location.href='admin.html'" class="w-full text-left p-2 text-sm hover:bg-white/5 rounded">📊 Dashboard Admin</button>
    <button id="menu-logout" class="w-full text-left p-2 text-sm text-sunset-vibrant hover:bg-white/5 rounded mt-1">🚪 Keluar</button>
  </div>
</div>

<!-- Main App -->
<div class="max-w-[640px] mx-auto px-5 pb-24">
  <!-- Header -->
  <div class="flex justify-between items-center pt-5 mb-4">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🗺️</span>
      <span class="font-display text-xl font-bold">Wandr</span>
      <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full">Banyuwangi</span>
    </div>
    <button id="btnLogin" class="w-9 h-9 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-lg hover:border-sunset-vibrant transition">🔐</button>
  </div>

  <!-- Progress Bar -->
  <div id="progress-area" class="mb-5">
    <div class="flex justify-between text-[10px] font-semibold mb-1">
      <span class="step-label active" data-i="0">Destinasi</span>
      <span class="step-label" data-i="1">Transport</span>
      <span class="step-label" data-i="2">Preferensi</span>
      <span class="step-label" data-i="3">Susun</span>
    </div>
    <div class="h-0.5 bg-white/10 rounded-full overflow-hidden">
      <div id="progress-fill" class="h-full bg-sunset-vibrant transition-all duration-300" style="width:0%"></div>
    </div>
  </div>

  <!-- Dynamic Content -->
  <div id="content"></div>

  <!-- Navigation Buttons -->
  <div id="nav" class="flex justify-between items-center pt-5 mt-2 border-t border-white/5">
    <button id="btn-back" class="btn-ghost hidden">← Kembali</button>
    <span id="dest-count" class="text-xs text-moss-muted"></span>
    <button id="btn-next" class="btn-pri disabled:opacity-40" disabled>Lanjut →</button>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ==================== FIREBASE INIT ====================
let db = null, auth = null;
try {
  if (typeof firebase !== 'undefined') {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: 'AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s',
        authDomain: 'banyuwangi-db.firebaseapp.com',
        projectId: 'banyuwangi-db',
        storageBucket: 'banyuwangi-db.firebasestorage.app',
        messagingSenderId: '973498690850',
        appId: '1:973498690850:web:b2d67373174542167a497b',
      });
    }
    db = firebase.firestore();
    auth = firebase.auth();
  }
} catch(e) { console.warn(e); }

// ==================== AUTH & ADMIN ====================
let isAdmin = false;
function setAdmin(val, email) {
  isAdmin = val;
  const btn = document.getElementById('btnLogin');
  if (val) { btn.textContent = '🔓'; btn.title = 'Admin'; btn.style.color = '#e07b39'; }
  else { btn.textContent = '🔐'; btn.title = 'Login'; btn.style.color = '#6a8a6a'; }
  if (email) document.getElementById('menu-username').innerHTML = email;
}

document.getElementById('btnLogin')?.addEventListener('click', () => {
  if (isAdmin) document.getElementById('user-menu').classList.toggle('hidden');
  else document.getElementById('modalLogin').style.display = 'flex';
});
document.getElementById('closeLogin')?.addEventListener('click', () => document.getElementById('modalLogin').style.display = 'none');
document.getElementById('btnDoLogin')?.addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPass').value;
  try { if(auth) await auth.signInWithEmailAndPassword(email,pass); else setAdmin(true,email); document.getElementById('modalLogin').style.display='none'; }
  catch(e) { document.getElementById('loginErr').innerText = e.message; document.getElementById('loginErr').style.display='block'; }
});
document.getElementById('menu-logout')?.addEventListener('click', () => { if(auth) auth.signOut(); else setAdmin(false); });
if(auth) auth.onAuthStateChanged(user => setAdmin(!!user, user?.email));

// ==================== DATA DESTINASI (Fallback + Firebase) ====================
const DESTINATIONS_FALLBACK = [
  { id:'ijen', name:'Kawah Ijen', cat:'alam', emoji:'🌋', desc:'Blue fire & kawah asam', bestTime:'dini hari', zone:'barat', tiket:5000, dur:360, isIjen:true, aliases:['ijen','kawah ijen'] },
  { id:'baluran', name:'TN Baluran', cat:'alam', emoji:'🦌', desc:'Afrika van Java', bestTime:'pagi', zone:'utara', tiket:15000, dur:240, aliases:['baluran'] },
  { id:'alas_purwo', name:'TN Alas Purwo', cat:'alam', emoji:'🌿', desc:'Hutan purba', bestTime:'pagi', zone:'selatan', tiket:5000, dur:300, aliases:['alas purwo'] },
  { id:'red_island', name:'Red Island', cat:'pantai', emoji:'🏄', desc:'Tebing merah sunset', bestTime:'sore', zone:'selatan', tiket:10000, dur:120, aliases:['red island','pulau merah'] },
  { id:'green_bay', name:'Green Bay', cat:'pantai', emoji:'🌊', desc:'Teluk ijo', bestTime:'pagi', zone:'selatan', tiket:10000, dur:240, aliases:['green bay'] },
  { id:'sukamade', name:'Pantai Sukamade', cat:'pantai', emoji:'🐢', desc:'Penyu hijau', bestTime:'malam', zone:'selatan', tiket:10000, dur:240, aliases:['sukamade'] },
  { id:'menjangan', name:'Pulau Menjangan', cat:'diving', emoji:'🤿', desc:'Snorkeling', bestTime:'pagi', zone:'utara', tiket:25000, dur:360, aliases:['menjangan'] },
  { id:'city', name:'City Tour BWI', cat:'budaya', emoji:'🏛️', desc:'Wisata kota', bestTime:'sore', zone:'kota', tiket:0, dur:240, aliases:['city tour'] },
];
let DESTINATIONS = [...DESTINATIONS_FALLBACK];
async function loadDestinations() { /* Sederhana, langsung fallback untuk demo */ DESTINATIONS = [...DESTINATIONS_FALLBACK]; }

// ==================== STATE ====================
const S = {
  step: 0, destinations: new Set(), destInput: '', kotaAsal: '', kotaAsalCustom: '', transport: '', subTransport: '',
  waktuTiba: '10:00', waktuPulang: '13:00', sewaLokal: new Set(), durasi: '', gayaPerjalanan: '',
  penginapan: '', penginapanIds: new Set(), penginapanDataList: [], penginapanCustom: '', jumlahOrang: 2,
  planDays: [], planBacklog: [], planArrivalExtras: [], loading: false, itinerary: null, error: null
};

// Helper
const fmt = n => { if(!n) return '–'; if(n>=1000000) return (n/1000000).toFixed(1)+'JT'; if(n>=1000) return Math.round(n/1000)+'K'; return String(n); };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const timeToMin = t => { if(!t) return 9999; const [h,m]=t.split(':').map(Number); return (h||0)*60+(m||0); };
const addMin = (t,m) => { let [h,mn]=t.split(':').map(Number); let tot=h*60+mn+m; return `${Math.floor(tot/60)%24}`.padStart(2,'0')+':'+`${tot%60}`.padStart(2,'0'); };
function parseDestInput(text) { S.destinations.clear(); text.split(',').forEach(term => { const d = DESTINATIONS.find(dd => dd.name.toLowerCase().includes(term.trim().toLowerCase())); if(d) S.destinations.add(d.id); }); }

// ==================== RENDER DENGAN DESAIN BARU ====================
function renderStep0() {
  const selected = DESTINATIONS.filter(d => S.destinations.has(d.id));
  const all = DESTINATIONS.slice(0,6);
  return `
    <div class="animate-fade-in">
      <h2 class="font-display text-3xl font-bold mb-1">Ke Banyuwangi,<br>mau kemana aja?</h2>
      <p class="text-on-surface-variant text-sm mb-5">Pilih destinasi favoritmu, kami akan susun rutenya.</p>
      <div class="relative mb-5">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-moss-muted">search</span>
        <input type="text" id="dest-input" value="${esc(S.destInput)}" placeholder="Cth: Kawah Ijen, Baluran, Red Island" 
               class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-10 pr-4 focus:border-sunset-vibrant outline-none">
      </div>
      <div class="grid grid-cols-2 gap-3 mb-6">
        ${all.map(d => `
          <div data-dest="${d.id}" class="group relative rounded-xl overflow-hidden bg-surface-variant cursor-pointer transition-all hover:scale-[1.02] ${S.destinations.has(d.id) ? 'ring-2 ring-sunset-vibrant' : ''}">
            <div class="aspect-[4/3] bg-cover bg-center" style="background-image: url('https://picsum.photos/200/150?random=${d.id}')"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
            <div class="absolute bottom-2 left-2 right-2">
              <div class="flex justify-between items-end">
                <span class="font-bold text-white text-sm">${d.emoji} ${d.name}</span>
                <span class="material-symbols-outlined text-sunset-vibrant text-base ${S.destinations.has(d.id) ? 'opacity-100' : 'opacity-0'}">check_circle</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      ${selected.length>0 ? `<div class="text-xs text-moss-muted">✓ ${selected.length} destinasi dipilih</div>` : ''}
    </div>
  `;
}

function renderStep1() {
  return `
    <div class="animate-fade-in space-y-5">
      <h2 class="font-display text-3xl font-bold">Naik apa?</h2>
      <p class="text-on-surface-variant text-sm">Pilih kota asal dan kendaraan ke Banyuwangi</p>
      <div class="space-y-2">
        <label class="text-xs font-semibold text-moss-muted">KOTA ASAL</label>
        <select id="sel-kota" class="w-full bg-white/5 border border-white/10 rounded-xl p-3">
          <option value="">Pilih kota...</option>
          <option value="Surabaya">Surabaya</option><option value="Jakarta">Jakarta</option><option value="Bali/Denpasar">Bali</option><option value="Malang">Malang</option>
        </select>
      </div>
      <div class="space-y-2">
        <label class="text-xs font-semibold text-moss-muted">KENDARAAN</label>
        <div class="grid grid-cols-1 gap-3">
          ${['pribadi_mobil','pribadi_motor','umum'].map(t => `
            <div data-transport="${t}" class="glass-card p-4 rounded-xl flex justify-between items-center cursor-pointer ${S.transport===t?'border-sunset-vibrant ring-1 ring-sunset-vibrant/20':'border-transparent'}">
              <div><span class="font-semibold">${t==='pribadi_mobil'?'Mobil Pribadi':t==='pribadi_motor'?'Motor Pribadi':'Kendaraan Umum'}</span><div class="text-xs text-moss-muted">${t==='umum'?'Kereta/Bus/Pesawat':'Fleksibel'}</div></div>
              <span class="material-symbols-outlined text-sunset-vibrant">${S.transport===t?'check_circle':'radio_button_unchecked'}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderStep2() {
  return `
    <div class="animate-fade-in space-y-6">
      <h2 class="font-display text-3xl font-bold">Preferensi Trip</h2>
      <div>
        <label class="text-xs font-semibold text-moss-muted">DURASI</label>
        <div class="flex gap-2 mt-2">
          ${['1D','2D1N','3D2N','4D3N'].map(d => `<button data-durasi="${d}" class="px-4 py-2 rounded-full ${S.durasi===d?'bg-sunset-vibrant text-white':'bg-white/5'}">${d}</button>`).join('')}
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-moss-muted">GAYA TRIP</label>
        <div class="flex gap-3 mt-2">
          ${['santai','eksplorasi'].map(g => `<div data-gaya="${g}" class="flex-1 glass-card p-4 rounded-xl text-center cursor-pointer ${S.gayaPerjalanan===g?'border-sunset-vibrant':''}"><span class="block text-lg">${g==='santai'?'🌴 Santai':'⚡ Eksplorasi'}</span><span class="text-xs text-moss-muted">${g==='santai'?'Maks 2 destinasi/hari':'3-4 destinasi/hari'}</span></div>`).join('')}
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-moss-muted">JUMLAH ORANG</label>
        <div class="flex items-center gap-4 mt-2">
          <button id="btn-minus" class="w-10 h-10 rounded-full border border-white/20">−</button>
          <span id="cnt-val" class="text-2xl font-bold w-10 text-center">${S.jumlahOrang}</span>
          <button id="btn-plus" class="w-10 h-10 rounded-full border border-white/20">+</button>
          <span class="text-sm">orang</span>
        </div>
      </div>
    </div>
  `;
}

function renderPlanningBoard() {
  const [totalDays] = [3]; // sederhana
  if (!S.planDays.length) S.planDays = [[],[]];
  const backlog = S.planBacklog.length ? S.planBacklog : DESTINATIONS.filter(d=>S.destinations.has(d.id)).slice(0,3).map(d=>d.id);
  return `
    <div class="animate-fade-in">
      <h2 class="font-display text-3xl font-bold mb-2">Susun Perjalananmu</h2>
      <p class="text-on-surface-variant text-sm mb-4">Seret destinasi ke hari yang diinginkan</p>
      <div class="space-y-4">
        <div class="glass-card p-3 rounded-xl">
          <div class="text-sm font-semibold mb-2">📦 Belum Dijadwalkan</div>
          <div id="bucket-unassigned" class="min-h-[80px] flex flex-wrap gap-2">
            ${backlog.map(id => `<div class="drag-item bg-white/5 px-3 py-1 rounded-full text-sm" data-id="${id}">${DESTINATIONS.find(d=>d.id===id)?.name}</div>`).join('')}
          </div>
        </div>
        ${S.planDays.map((ids, i) => `
          <div class="glass-card p-3 rounded-xl">
            <div class="text-sm font-semibold mb-2">Hari ${i+2}</div>
            <div id="bucket-day${i}" class="min-h-[60px] flex flex-wrap gap-2">
              ${ids.map(id => `<div class="drag-item bg-sunset-vibrant/20 px-3 py-1 rounded-full text-sm" data-id="${id}">${DESTINATIONS.find(d=>d.id===id)?.name}</div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
      <p class="text-xs text-moss-muted mt-3">*Hari 1 otomatis untuk kedatangan, hari terakhir untuk kepulangan</p>
    </div>
  `;
}

function renderStep3() {
  if (S.loading) return `<div class="text-center py-20 animate-pulse">✨ Menyusun itinerary ...</div>`;
  if (S.error) return `<div class="text-center py-20 text-red-400">Error: ${S.error}</div>`;
  if (!S.itinerary) return `<div class="text-center py-20">Belum ada itinerary, klik "Generate Itinerary"</div>`;
  const it = S.itinerary;
  return `
    <div class="animate-slide-up space-y-5">
      <div class="glass-card p-5 rounded-2xl">
        <div class="flex justify-between"><h2 class="font-display text-2xl">Itinerary Banyuwangi ✨</h2><div class="bg-primary-container px-3 py-1 rounded-full text-xs">EST. BUDGET ${fmt(it.estimatedBudget?.min)}-${fmt(it.estimatedBudget?.max)}</div></div>
        <p class="text-sm text-moss-muted mt-2">${it.summary}</p>
      </div>
      ${it.days?.map(day => `
        <div class="border-l-2 border-sunset-vibrant pl-4">
          <div class="font-display text-xl mb-2">Hari ${day.day} — ${day.title}</div>
          <div class="space-y-3">
            ${day.activities?.map(act => `
              <div class="flex gap-3">
                <div class="w-16 text-xs text-moss-muted">${act.time}</div>
                <div><div class="font-semibold">${act.name}</div><div class="text-xs text-moss-muted">${act.description}</div>${act.tips?`<div class="text-xs text-sunset-vibrant mt-1">💡 ${act.tips}</div>`:''}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
      <button id="btn-restart" class="w-full glass-card py-3 rounded-xl text-center">↺ Buat Itinerary Baru</button>
    </div>
  `;
}

function render() {
  const c = document.getElementById('content');
  if (S.step===0) c.innerHTML = renderStep0();
  else if (S.step===1) c.innerHTML = renderStep1();
  else if (S.step===2) c.innerHTML = renderStep2();
  else if (S.step===3) {
    if (S.loading || S.itinerary || S.error) c.innerHTML = renderStep3();
    else c.innerHTML = renderPlanningBoard();
  }
  document.getElementById('progress-fill').style.width = (S.step/3)*100+'%';
  document.querySelectorAll('.step-label').forEach((el,i)=>el.classList.toggle('active',i===S.step));
  const ok = S.step===0 ? S.destinations.size>0 : S.step===1 ? S.transport : S.step===2 ? S.durasi && S.gayaPerjalanan : true;
  document.getElementById('btn-next').disabled = !ok;
  document.getElementById('btn-next').innerText = S.step===3 ? '✨ Generate Itinerary' : 'Lanjut →';
  document.getElementById('btn-back').classList.toggle('hidden',S.step===0);
  attachListeners();
}

function attachListeners() {
  // Step 0
  document.querySelectorAll('[data-dest]').forEach(el => {
    el.onclick = () => { const id = el.dataset.dest; if(S.destinations.has(id)) S.destinations.delete(id); else S.destinations.add(id); render(); };
  });
  const inp = document.getElementById('dest-input');
  if(inp) inp.oninput = (e) => { S.destInput = e.target.value; parseDestInput(S.destInput); render(); };
  // Step 1
  document.querySelectorAll('[data-transport]').forEach(el => { el.onclick = () => { S.transport = el.dataset.transport; render(); }; });
  const sel = document.getElementById('sel-kota');
  if(sel) sel.onchange = () => { S.kotaAsal = sel.value; render(); };
  // Step 2
  document.querySelectorAll('[data-durasi]').forEach(el => { el.onclick = () => { S.durasi = el.dataset.durasi; render(); }; });
  document.querySelectorAll('[data-gaya]').forEach(el => { el.onclick = () => { S.gayaPerjalanan = el.dataset.gaya; render(); }; });
  const minus = document.getElementById('btn-minus'), plus = document.getElementById('btn-plus'), cnt = document.getElementById('cnt-val');
  if(minus) minus.onclick = () => { if(S.jumlahOrang>1) S.jumlahOrang--; if(cnt) cnt.innerText = S.jumlahOrang; };
  if(plus) plus.onclick = () => { if(S.jumlahOrang<20) S.jumlahOrang++; if(cnt) cnt.innerText = S.jumlahOrang; };
  // Restart
  const restart = document.getElementById('btn-restart');
  if(restart) restart.onclick = () => { S.step=0; S.destinations.clear(); S.itinerary=null; S.error=null; S.loading=false; render(); };
}

// ==================== GENERATE ITINERARY (Mock) ====================
async function generate() {
  S.loading = true; render();
  setTimeout(() => {
    const selected = DESTINATIONS.filter(d=>S.destinations.has(d.id));
    S.itinerary = {
      summary: `Itinerary ${selected.length} destinasi selama 3 hari di Banyuwangi.`,
      days: [
        { day:1, title:'Kedatangan', activities:[{time:'10:00',name:'Tiba di Banyuwangi',description:'Check-in penginapan'},{time:'19:00',name:'Makan malam',description:'Kuliner lokal'}] },
        { day:2, title:`Eksplorasi ${selected[0]?.name||'Wisata'}`, activities:[{time:'08:00',name:selected[0]?.name||'Wisata',description:'Menikmati keindahan alam'}] },
        { day:3, title:'Kepulangan', activities:[{time:'13:00',name:'Pulang',description:'Perjalanan balik'}] }
      ],
      estimatedBudget: { min:500000, max:1500000 }
    };
    S.loading = false; render();
  }, 500);
}

// ==================== NAVIGASI ====================
document.getElementById('btn-back').onclick = () => { S.step--; render(); };
document.getElementById('btn-next').onclick = () => {
  if (S.step===3) generate();
  else if (S.step===2) { S.step=3; initPlanDays(); render(); }
  else if (S.step===1) { S.step=2; render(); }
  else { S.step++; render(); }
};
function initPlanDays() { S.planDays = [[],[]]; S.planBacklog = [...S.destinations]; }

// ==================== SORTABLEJS ====================
function initSortable() {
  const buckets = ['bucket-unassigned', ...Array.from({length:S.planDays.length}, (_,i)=>`bucket-day${i}`)].map(id=>document.getElementById(id)).filter(Boolean);
  buckets.forEach(b => { if(b) new Sortable(b, { group:'shared', animation:200, onEnd:()=>{ readPlanFromDOM(); } }); });
}
function readPlanFromDOM() {
  S.planDays = S.planDays.map((_,i) => [...document.getElementById(`bucket-day${i}`)?.querySelectorAll('.drag-item')||[]].map(el=>el.dataset.id));
  S.planBacklog = [...document.getElementById('bucket-unassigned')?.querySelectorAll('.drag-item')||[]].map(el=>el.dataset.id);
}
// Override renderPlanningBoard untuk panggil Sortable setelah render
const originalRender = render;
window.render = function() { originalRender(); setTimeout(initSortable, 50); };
render = window.render;

// ==================== INIT ====================
loadDestinations().then(() => render());
</script>
